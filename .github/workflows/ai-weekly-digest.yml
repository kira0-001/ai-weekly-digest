name: AI Daily Digest

on:
  schedule:
    - cron: "30 4 * * *"   # 04:30 UTC every day -> 10:00 IST daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SENDER_NAME: "AI Daily Digest Bot"
          TIMEZONE: "Asia/Kolkata"
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_API_KEY: ${{ secrets.WHATSAPP_API_KEY }}
        run: |
          python digest/main.py

      - name: Deploy website to GitHub Pages
        run: |
          git config user.name "AI Digest Bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || (git commit -m "update: daily digest $(date +%Y-%m-%d)" && git push)
